name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
      - run: pip install ".[dev]"
      - run: black --check .
      - run: isort --check-only .
      - run: flake8 --max-line-length=100 --exclude=.git,__pycache__,build,dist --ignore=E402,F401,F541,W291,W293,E203,E231,E501,W503,F811,F841,E226,E741,E731,F403,F601,E201,E202,E712

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: pip install ".[test]"
      - run: >
          pytest
          tests/test_v2.py tests/test_unit.py tests/test_academic.py
          tests/test_advanced_features.py tests/test_docker_lab.py
          tests/test_integration_mocked.py tests/test_dynamic_mocked.py
          tests/test_integration_e2e.py tests/test_integration.py
          --tb=short -v
